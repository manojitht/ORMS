{# Usage: {% include 'includes/empty_state.html' with icon='inbox' title='No results' subtitle='...' action_url=... action_label=... %} #}
<div class="empty-state">
    <div class="empty-state__icon"><i data-lucide="{{ icon|default:'inbox' }}"></i></div>
    <p class="empty-state__title">{{ title|default:'Nothing here yet' }}</p>
    {% if subtitle %}<p class="empty-state__subtitle">{{ subtitle }}</p>{% endif %}
    {% if action_url %}
    <a href="{{ action_url }}" class="btn btn-outline-primary btn-sm empty-state__action">{{ action_label|default:'Add new' }}</a>
    {% endif %}
</div>
