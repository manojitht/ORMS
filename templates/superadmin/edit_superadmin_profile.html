{% extends 'base.html' %}
{% load static %}

{% block title %}ORMS | Edit Profile{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <h1 class="orms-page-header"><i class='bx bx-user-circle'></i> Edit My Profile</h1>
    {% include 'message_alert.html' %}

    {% if user %}
    <div class="card mx-auto" style="max-width: 720px;">
        <div class="card-body p-4">
            <form action="{% url 'account:superadmin_update_user_profile' user.id %}" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="text-center mb-3">
                    {% if user.accountprofile.profile_image %}
                        <img src="{{ user.accountprofile.profile_image.url }}" class="rounded-circle" style="width:88px; height:88px; object-fit:cover;">
                    {% else %}
                        <img src="{% static 'images/image_placeholder.jpg' %}" class="rounded-circle" style="width:88px; height:88px; object-fit:cover;">
                    {% endif %}
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">First name</label>
                        <input name="first_name" class="form-control" type="text" value="{{ user.first_name }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Last name</label>
                        <input name="last_name" class="form-control" type="text" value="{{ user.last_name }}" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Position</label>
                        <input class="form-control" type="text" value="{{ user.role }}" readonly>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Peoplesoft Id</label>
                        <input class="form-control" type="text" value="{{ user.peoplesoft_id }}" readonly>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Department</label>
                        <input class="form-control" type="text" value="{{ user.department }}" readonly>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Team</label>
                        <input class="form-control" type="text" value="{{ user.team }}" readonly>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input name="email" class="form-control" type="email" value="{{ user.email }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Contact number</label>
                        <input name="contact_number" class="form-control" type="text" value="{{ user.accountprofile.contact_number }}" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Home address</label>
                    <input name="home_address" class="form-control" type="text" value="{{ user.accountprofile.home_address }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Profile image</label>
                    <input name="profile_image" class="form-control" type="file" accept="image/*" {% if not user.accountprofile.profile_image %}required{% endif %}>
                </div>
                <div class="d-flex gap-2">
                    <a href="{% url 'account:superadmin_user_profile' %}" class="btn btn-outline-secondary flex-fill">Back</a>
                    <button type="submit" class="btn btn-primary flex-fill">Update Profile</button>
                </div>
            </form>
        </div>
    </div>
    {% endif %}
</div>
{% endblock %}
