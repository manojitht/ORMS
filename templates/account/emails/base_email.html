{% autoescape off %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arivom</title>
</head>
<body style="margin:0; padding:0; background-color:#F1F5F9; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F1F5F9; padding:32px 16px;">
<tr>
<td align="center">
<table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; width:100%;">

<!-- Header / wordmark -->
<tr>
<td style="padding:0 8px 20px 8px;">
<table role="presentation" cellpadding="0" cellspacing="0" border="0">
<tr>
<td style="background-color:#0284C7; width:32px; height:32px; border-radius:8px; text-align:center; vertical-align:middle; font-size:16px; line-height:32px; color:#ffffff; font-weight:700;">S</td>
<td style="padding-left:10px; font-size:18px; font-weight:700; color:#0F1B2A;">Arivom</td>
</tr>
</table>
</td>
</tr>

<!-- Content card -->
<tr>
<td style="background-color:#ffffff; border:1px solid #E4EBF2; border-radius:12px; padding:36px;">
<h1 style="margin:0 0 16px 0; font-size:20px; line-height:28px; color:#0F1B2A; font-weight:700;">{% block heading %}{% endblock %}</h1>
<div style="font-size:15px; line-height:24px; color:#33475B;">
{% block body %}{% endblock %}
</div>
{% block cta %}{% endblock %}
</td>
</tr>

<!-- Footer -->
<tr>
<td style="padding:24px 8px 0 8px; text-align:center;">
<p style="margin:0; font-size:13px; line-height:20px; color:#94A3B8;">{% block footer_note %}{% endblock %}</p>
<p style="margin:8px 0 0 0; font-size:12px; color:#B8C4D1;">&copy; Arivom - Office Resources Management System</p>
</td>
</tr>

</table>
</td>
</tr>
</table>
</body>
</html>
{% endautoescape %}
