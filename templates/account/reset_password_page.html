{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORMS | Reset password</title>
    <link rel="stylesheet" href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}">
    <link href='https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{% static 'custom.css' %}">
    <link rel="stylesheet" href="{% static 'welcome_page.css' %}">
</head>
<body class="welcome-body">
    <section class="login-hero d-flex align-items-center justify-content-center">
        <div class="login-card">
            <div class="text-center mb-4">
                <i class='bx bx-key login-lock-icon'></i>
                <h1 class="login-title">Reset your password</h1>
                <p class="login-subtitle">Choose a new password for your account</p>
            </div>

            {% include 'message_alert.html' %}

            <form action="{% url 'account:reset_password_activity' %}" method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="password">New password</label>
                    <input type="password" id="password" name="password" class="form-control form-control-lg" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="confirm_password">Confirm password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control form-control-lg" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Reset password</button>
            </form>
        </div>
    </section>
</body>
</html>
