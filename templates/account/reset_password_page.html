{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="{% static 'theme-init.js' %}"></script>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sukhra | Reset password</title>
    <link rel="stylesheet" href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'design-system.css' %}">
</head>
<body class="welcome-body">
    {% include 'includes/theme_toggle.html' with floating=True %}
    <section class="auth-hero d-flex align-items-center justify-content-center">
        <div class="grid-backdrop"></div>
        <div class="login-card">
            <div class="text-center mb-4">
                <i data-lucide="key" class="login-lock-icon"></i>
                <h1 class="login-title">Reset your password</h1>
                <p class="login-subtitle">Choose a new password for your account</p>
            </div>

            {% include 'message_alert.html' %}

            <form action="{% url 'account:reset_password_activity' %}" method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="password">New password</label>
                    <input type="password" id="password" name="password" class="form-control form-control-lg" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="confirm_password">Confirm password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control form-control-lg" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Reset password</button>
            </form>
        </div>
    </section>

    <script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="{% static 'script.js' %}"></script>
</body>
</html>
