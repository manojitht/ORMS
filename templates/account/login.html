{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sukhra | Login</title>
    <link rel="stylesheet" href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'design-system.css' %}">

    <!-- Favicons of Sukhra -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicons/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicons/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicons/favicon-16x16.png' %}">
    <link rel="manifest" href="{% static 'favicons/site.webmanifest' %}">
</head>
<body class="welcome-body">
    <section class="auth-hero d-flex align-items-center justify-content-center">
        <div class="grid-backdrop"></div>
        <div class="login-card">
            <div class="text-center mb-4">
                <div class="d-flex justify-content-center mb-3">
                    <a href="{% url 'home' %}">{% include 'includes/logo.html' with size=56 %}</a>
                </div>
                <h1 class="login-title">Welcome back</h1>
                <p class="login-subtitle">Sign in to your Sukhra account</p>
            </div>

            {% include 'message_alert.html' %}

            <form action="{% url 'account:login' %}" method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="peoplesoft_id">Peoplesoft ID</label>
                    <input type="number" id="peoplesoft_id" name="peoplesoft_id" class="form-control form-control-lg" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control form-control-lg" required>
                </div>
                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Log in</button>
                <p class="text-center mt-3 mb-0">
                    <a href="{% url 'account:forgot_password' %}">Forgot your password?</a>
                </p>
                <p class="text-center mt-2 mb-0">
                    New company? <a href="{% url 'companies:signup' %}">Set up your workspace</a>
                </p>
            </form>
        </div>
    </section>

    <script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="{% static 'script.js' %}"></script>
</body>
</html>
