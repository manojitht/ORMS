{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORMS | Login</title>
    <link rel="stylesheet" href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}">
    <link href='https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{% static 'custom.css' %}">
    <link rel="stylesheet" href="{% static 'welcome_page.css' %}">

    <!-- Favicons of ORMS -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicons/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicons/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicons/favicon-16x16.png' %}">
    <link rel="manifest" href="{% static 'favicons/site.webmanifest' %}">
</head>
<body class="welcome-body">
    <section class="login-hero d-flex align-items-center justify-content-center">
        <div class="login-card">
            <div class="text-center mb-4">
                <img src="{% static 'images//ORMS-logos/ORMS-1 (1).png' %}" alt="ORMS logo" class="login-logo mb-3">
                <h1 class="login-title">Welcome back</h1>
                <p class="login-subtitle">Sign in to your ORMS account</p>
            </div>

            {% include 'message_alert.html' %}

            <form action="{% url 'account:login' %}" method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="peoplesoft_id">Peoplesoft ID</label>
                    <input type="number" id="peoplesoft_id" name="peoplesoft_id" class="form-control form-control-lg" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control form-control-lg" required>
                </div>
                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Log in</button>
                <p class="text-center mt-3 mb-0">
                    <a href="{% url 'account:forgot_password' %}">Forgot your password?</a>
                </p>
            </form>
        </div>
    </section>
</body>
</html>
