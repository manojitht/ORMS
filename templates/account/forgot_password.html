{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORMS | Forgot password</title>
    <link rel="stylesheet" href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}">
    <link href='https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{% static 'custom.css' %}">
    <link rel="stylesheet" href="{% static 'welcome_page.css' %}">

    <!-- Favicons of ORMS -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicons/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicons/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicons/favicon-16x16.png' %}">
    <link rel="manifest" href="{% static 'favicons/site.webmanifest' %}">
</head>
<body class="welcome-body">
    <section class="login-hero d-flex align-items-center justify-content-center">
        <div class="login-card">
            <div class="text-center mb-4">
                <i class='bx bx-lock-alt login-lock-icon'></i>
                <h1 class="login-title">Forgot your password?</h1>
                <p class="login-subtitle">We'll email you a link to reset it</p>
            </div>

            {% include 'message_alert.html' %}

            <form action="{% url 'account:forgot_password' %}" method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="email">Email address</label>
                    <input type="email" id="email" name="email" class="form-control form-control-lg" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Send reset link</button>
                <p class="text-center mt-3 mb-0">
                    <a href="{% url 'account:login' %}">Back to login</a>
                </p>
            </form>
        </div>
    </section>
</body>
</html>
