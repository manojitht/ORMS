{% extends 'base.html' %}
{% load static %}

{% block title %}ORMS | Add Resource{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <h1 class="orms-page-header"><i class='bx bx-devices'></i> Add Resource</h1>
    {% include 'message_alert.html' %}

    <div class="card mx-auto" style="max-width: 640px;">
        <div class="card-body p-4">
            <form action="{% url 'resources:add_resource_page' %}" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Asset Id</label>
                    <input type="text" name="asset_id" class="form-control" placeholder="Enter asset id.." value="{{ full_generated_aset_id }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Resource type</label>
                    <select name="resource_category" class="form-select">
                        <option selected>--Choose Resource Type--</option>
                        {% for category in resource_categories %}
                        <option>{{ category.resource_category }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Model name</label>
                    <input type="text" name="model_name" class="form-control" placeholder="Enter model name.." required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Bitlocker key</label>
                    <input type="text" name="bitlocker_key" class="form-control" placeholder="Enter the bitlocker key (if applicable)..">
                </div>
                <div class="mb-3">
                    <label class="form-label">Resource availability</label>
                    <select name="resource_availability" class="form-select">
                        <option selected>Available</option>
                        <option>Configuration</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Resource description (max 250 words)</label>
                    <textarea name="resource_description" class="form-control" rows="4" placeholder="Enter resource description.." required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Resource image</label>
                    <input type="file" name="resource_image" class="form-control" accept="image/*" required>
                </div>
                <input type="hidden" name="added_by" value="{{ user.first_name }} {{ user.last_name }}">
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">Add Resource</button>
                    <a href="{% url 'resources:resources_listings_page' %}" class="btn btn-outline-secondary flex-fill">Back to Resources</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
