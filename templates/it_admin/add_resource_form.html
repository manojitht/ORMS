{% extends 'base.html' %}
{% load static %}

{% block title %}Sukhra | Add Resource{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <h1 class="page-header"><i data-lucide="laptop"></i> Add Resource</h1>
    {% include 'message_alert.html' %}

    <div class="card mx-auto" style="max-width: 640px;">
        <div class="card-body p-4">
            <form action="{% url 'resources:add_resource_page' %}" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Asset Id</label>
                    <input type="text" name="asset_id" class="form-control" placeholder="Enter asset id.." value="{{ full_generated_aset_id }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Resource type</label>
                    <select name="resource_category" id="resource_category_select" class="form-select">
                        <option selected value="">--Choose Resource Type--</option>
                        {% for category in resource_categories %}
                        <option value="{{ category.id }}">{{ category.resource_category }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Model name</label>
                    <input type="text" name="model_name" class="form-control" placeholder="Enter model name.." required>
                </div>
                <div id="attribute-fields">
                {% for key, label in all_attribute_defs %}
                    <div class="mb-3 attribute-field d-none" data-key="{{ key }}">
                        <label class="form-label">{{ label }}</label>
                        <input type="text" name="attr__{{ key }}" class="form-control" disabled>
                    </div>
                {% endfor %}
                </div>
                <script id="category-schema-data" type="application/json">{{ category_schema_json|safe }}</script>
                <div class="mb-3">
                    <label class="form-label">Resource availability</label>
                    <select name="resource_availability" class="form-select">
                        <option selected>Available</option>
                        <option>Configuration</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Resource description (max 250 words)</label>
                    <textarea name="resource_description" class="form-control" rows="4" placeholder="Enter resource description.." required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Resource image</label>
                    <input type="file" name="resource_image" class="form-control" accept="image/*" required>
                </div>
                <input type="hidden" name="added_by" value="{{ user.first_name }} {{ user.last_name }}">
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">Add Resource</button>
                    <a href="{% url 'resources:resources_listings_page' %}" class="btn btn-outline-secondary flex-fill">Back to Resources</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function () {
    var select = document.getElementById('resource_category_select');
    var schemaEl = document.getElementById('category-schema-data');
    if (!select || !schemaEl) return;
    var schema = JSON.parse(schemaEl.textContent);
    function sync() {
        var keys = schema[select.value] || [];
        document.querySelectorAll('.attribute-field').forEach(function (field) {
            var show = keys.indexOf(field.dataset.key) !== -1;
            field.classList.toggle('d-none', !show);
            var input = field.querySelector('input');
            if (input) input.disabled = !show;
        });
    }
    select.addEventListener('change', sync);
    sync();
});
</script>
{% endblock %}
