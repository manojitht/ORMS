{% extends 'base.html' %}
{% load static %}

{% block title %}ORMS | Add Team Member{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <h1 class="orms-page-header"><i class='bx bx-user-plus'></i> Add Team Member</h1>
    {% include 'message_alert.html' %}

    <div class="card mx-auto" style="max-width: 640px;">
        <div class="card-body p-4">
            <form action="{% url 'members:add_member' %}" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Peoplesoft Id</label>
                        <input type="number" name="peoplesoft_id" class="form-control" placeholder="Enter peoplesoft id.." required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full name</label>
                        <input type="text" name="fullname" class="form-control" placeholder="Enter full name.." required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Position role</label>
                        <input type="text" name="position" class="form-control" placeholder="Enter position role.." required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter email.." required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Contact</label>
                        <input type="number" name="contact" class="form-control" placeholder="Enter contact number.." required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Home address</label>
                        <input type="text" name="home_address" class="form-control" placeholder="Enter home address.." required>
                    </div>
                </div>
                <input type="hidden" name="manager_peoplesoft_id" value="{{ user.peoplesoft_id }}">
                <input type="hidden" name="manager_name" value="{{ user.first_name }} {{ user.last_name }}">
                <input type="hidden" name="department" value="{{ user.department }}">
                <input type="hidden" name="team" value="{{ user.team }}">
                <div class="mb-3">
                    <label class="form-label">Team member profile image</label>
                    <input type="file" name="member_image" class="form-control" accept="image/*" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">Create Profile</button>
                    <a href="{% url 'members:view_team_members' user.id %}" class="btn btn-outline-secondary flex-fill">Back to My Team</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
