# Plain-HTTP reverse proxy + static/media file server for the `app` service.
#
# TLS is NOT terminated here. For real internet-facing deployment, put this
# stack behind something that does (a cloud load balancer/CDN, or Caddy/
# Traefik with Let's Encrypt) and keep DJANGO_SECURE_SSL_REDIRECT=True so
# Django enforces HTTPS. For local docker-compose testing with no TLS in
# front at all, set DJANGO_SECURE_SSL_REDIRECT=False in .env or every
# request will redirect-loop.

upstream arivom_app {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://arivom_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
